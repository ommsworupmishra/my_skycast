<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My_skycast | Global Weather Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .brand-name {
            font-size: 1.2rem;
            font-weight: 800;
            color: #ffce54;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .search-container {
            display: flex;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 15px;
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 12px;
            width: 100%;
            font-size: 16px;
        }

        button {
            background: #ffce54;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            color: #1e3c72;
            transition: 0.3s;
        }

        button:hover { background: #fff; }

        .loading { display: none; font-size: 0.9rem; color: #ffce54; margin-bottom: 10px; }

        /* Weather UI */
        .city-title { font-size: 2.2rem; margin-top: 10px; font-weight: 600; }
        .region-info { font-size: 0.9rem; opacity: 0.7; margin-bottom: 10px; text-transform: uppercase; }
        .temp-display { font-size: 5rem; font-weight: 800; margin: 10px 0; }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .item span { font-size: 0.7rem; opacity: 0.6; display: block; text-transform: uppercase; }
        .item p { font-weight: 600; font-size: 1.1rem; margin-top: 5px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .weather-box { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body>

    <div class="card">
        <div class="brand-name">My_skycast</div>

        <div class="search-container">
            <input type="text" id="userInput" placeholder="Search City, District, or Country..." value="Odisha">
            <button onclick="fetchWeather()">SEARCH</button>
        </div>

        <div id="loader" class="loading">Locating place...</div>

        <div id="weatherBox" class="weather-box">
            <p class="region-info" id="fullLocation">India</p>
            <h2 class="city-title" id="displayName">Odisha</h2>
            <h1 class="temp-display" id="mainTemp">--°C</h1>
            
            <div class="grid">
                <div class="item">
                    <span>Wind Speed</span>
                    <p id="windSpeed">-- km/h</p>
                </div>
                <div class="item">
                    <span>Weather Code</span>
                    <p id="weatherDesc">Clear</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchWeather() {
            const query = document.getElementById('userInput').value;
            const loader = document.getElementById('loader');
            const weatherBox = document.getElementById('weatherBox');

            if (!query) return;

            loader.style.display = "block";
            weatherBox.style.opacity = "0.2";

            try {
                // 1. GLOBAL SEARCH: Finds any city, district, village or continent
                const searchUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=en&format=json`;
                const searchRes = await fetch(searchUrl);
                const searchData = await searchRes.json();

                if (!searchData.results) {
                    alert("Place not found! Try being more specific (e.g., 'Cuttack, Odisha' or 'Paris, France').");
                    return;
                }

                const place = searchData.results[0];
                const { latitude, longitude, name, admin1, country } = place;

                // 2. GET WEATHER: Specific to those exact coordinates
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                const weatherData = await weatherRes.json();

                // 3. UPDATE UI
                document.getElementById('displayName').innerText = name;
                document.getElementById('fullLocation').innerText = `${admin1 ? admin1 + ', ' : ''}${country}`;
                document.getElementById('mainTemp').innerText = Math.round(weatherData.current_weather.temperature) + "°C";
                document.getElementById('windSpeed').innerText = weatherData.current_weather.windspeed + " km/h";
                
                // Weather condition description logic
                const code = weatherData.current_weather.weathercode;
                document.getElementById('weatherDesc').innerText = code === 0 ? "Sunny" : code < 50 ? "Cloudy" : "Rainy";

            } catch (err) {
                alert("Error connecting to weather service.");
            } finally {
                loader.style.display = "none";
                weatherBox.style.opacity = "1";
            }
        }

        // Run on start
        fetchWeather();
    </script>
</body>
</html>
