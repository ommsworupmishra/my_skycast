<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My_skycast | Global Weather</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .brand-name {
            font-size: 1.2rem;
            font-weight: 800;
            color: #ffce54;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .search {
            display: flex;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 20px;
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 10px;
            width: 100%;
            font-size: 16px;
        }

        button {
            background: #ffce54;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            color: #1e3c72;
        }

        /* Weather Display Area */
        .city { font-size: 2rem; margin-top: 10px; font-weight: 500; }
        .temp { font-size: 4.5rem; font-weight: 700; margin: 10px 0; }
        .info { opacity: 0.7; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }

        .details {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .col span { font-size: 0.7rem; opacity: 0.6; display: block; }
        .col p { font-weight: 600; font-size: 1.1rem; margin-top: 5px; }

        /* Animation */
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        .loading { animation: pulse 1s infinite; font-style: italic; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div class="brand-name">My_skycast</div>

        <div class="search">
            <input type="text" id="cityInput" placeholder="Enter city or town..." value="Bhubaneswar">
            <button onclick="getWeather()">GO</button>
        </div>

        <div id="loading" class="loading">Searching global maps...</div>

        <div id="weatherContent">
            <p class="info" id="statusHeader">Current Weather</p>
            <p class="city" id="cityName">Bhubaneswar</p>
            <h1 class="temp" id="temperature">--°C</h1>
            
            <div class="details">
                <div class="col">
                    <span>Wind Speed</span>
                    <p id="wind">-- km/h</p>
                </div>
                <div class="col">
                    <span>Region</span>
                    <p id="country">--</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function getWeather() {
            const city = document.getElementById('cityInput').value;
            const content = document.getElementById('weatherContent');
            const loader = document.getElementById('loading');
            
            if(!city) return alert("Please type a place name!");

            // Show loading, hide content
            loader.style.display = "block";
            content.style.opacity = "0.3";

            try {
                // STEP 1: Search for the city (using a wider search)
                const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
                const geoRes = await fetch(geoUrl);
                const geoData = await geoRes.json();

                if (!geoData.results) {
                    alert("Place not found. Try adding the state or country name (e.g., 'London, UK')");
                    loader.style.display = "none";
                    content.style.opacity = "1";
                    return;
                }

                const { latitude, longitude, name, admin1, country } = geoData.results[0];

                // STEP 2: Get the weather for that specific spot
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                const weatherData = await weatherRes.json();

                // STEP 3: Update the Screen
                document.getElementById('cityName').innerText = name;
                document.getElementById('country').innerText = admin1 || country || "Global";
                document.getElementById('temperature').innerText = Math.round(weatherData.current_weather.temperature) + "°C";
                document.getElementById('wind').innerText = weatherData.current_weather.windspeed + " km/h";
                document.getElementById('statusHeader').innerText = "Weather in " + name;

            } catch (error) {
                alert("Internet error! Please check your connection.");
            } finally {
                loader.style.display = "none";
                content.style.opacity = "1";
            }
        }

        // Run automatically when page opens
        getWeather();
    </script>
</body>
</html>
